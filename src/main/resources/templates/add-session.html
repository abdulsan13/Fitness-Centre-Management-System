<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Session - FitAll</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Add New Session</h1>
            <nav>
                <a href="/timetable">Timetable</a>
                <a href="/add">Add Session</a>
            </nav>
        </header>

        <section class="form-section">
            <form th:action="@{/add}" th:object="${fitSession}" method="post" class="session-form">
                <div class="form-group">
                    <label for="sessionName">Session Name:</label>
                    <input type="text" id="sessionName" th:field="*{sessionName}" required placeholder="e.g., Pilates">
                </div>

                <div class="form-group">
                    <label for="fitnessLevel">Fitness Level:</label>
                    <select id="fitnessLevel" th:field="*{fitnessLevel}" required>
                        <option value="">Select level</option>
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="dayOfWeek">Day of Week:</label>
                    <select id="dayOfWeek" th:field="*{dayOfWeek}" required>
                        <option value="">Select day</option>
                        <option value="MON">Monday</option>
                        <option value="TUE">Tuesday</option>
                        <option value="WED">Wednesday</option>
                        <option value="THU">Thursday</option>
                        <option value="FRI">Friday</option>
                        <option value="SAT">Saturday</option>
                        <option value="SUN">Sunday</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="startTime">Start Time (HH:mm):</label>
                    <input type="text" id="startTime" th:field="*{startTime}" required placeholder="e.g., 09:00" pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]">
                </div>

                <div class="form-group">
                    <label for="duration">Duration (minutes):</label>
                    <input type="number" id="duration" th:field="*{duration}" required min="1" placeholder="e.g., 55">
                </div>

                <div class="form-group">
                    <label for="availableSpaces">Available Spaces:</label>
                    <input type="number" id="availableSpaces" th:field="*{availableSpaces}" required min="1" placeholder="e.g., 15">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-submit">Add Session</button>
                    <a href="/timetable" class="btn btn-cancel">Cancel</a>
                </div>
            </form>
        </section>
   </body>
</html>
 </div>
